version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:4.2.4-management
    container_name: rabbitmq-core
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - shared-net

networks:
  shared-net:
    name: is-microservices-net