version: '3.8'

services:
  email-api:
    build:
      context: ..
      dockerfile: EmailProject/Dockerfile
    container_name: email-project-api
    ports:
      - "5089:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMq__Host=rabbitmq-core
    networks:
      - shared-net

networks:
  shared-net:
    external: true
    name: is-microservices-net