version: '3.8'

services:
  mailing-db:
    image: postgres:18.3-alpine3.23
    container_name: mailing-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: email_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d email_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  mailing-worker:
    build:
      context: ..
      dockerfile: MailingService/Dockerfile
    container_name: mailing-service
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMqSettings__Host=rabbitmq-core
      - ConnectionStrings__MailingDb=Server=mailing-db;Database=email_db;Username=postgres;Password=postgres
    depends_on:
      mailing-db:
        condition: service_healthy
    networks:
      - default
      - shared-net

networks:
  shared-net:
    external: true
    name: is-microservices-net

volumes:
  postgres-data: